<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traveling Star Empire</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #000;
        color: #f5f5f5;
    }

    main {
        max-width: 600px;
        margin: auto;
        padding: 20px;
    }

    section {
        background: #111;
        padding: 20px;
        border-radius: 10px;
        border: 1px solid gold;
        box-shadow: 0 0 12px rgba(255,215,0,0.15);
        margin-bottom: 20px;
    }

    h2 {
        color: gold;
        text-shadow: 0 0 8px rgba(255,215,0,0.6);
    }

    select, button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: none;
    }

    select {
        background: #000;
        color: gold;
        border: 1px solid #444;
    }

    button {
        background: gold;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 0 10px rgba(255,215,0,0.4);
    }

    button:hover {
        background: #ffea75;
        box-shadow: 0 0 18px rgba(255,215,0,0.7);
    }
</style>
</head>

<body>

<main>

<section>
    <h2>Review Your Order</h2>
    <p><strong>Name:</strong> <span id="rev-name"></span></p>
    <p><strong>Phone:</strong> <span id="rev-phone"></span></p>
    <p><strong>Details:</strong></p>
    <p id="rev-details"></p>
</section>

<section>
    <h2>Payment Method</h2>
    <select id="payment-method">
        <option value="debit">Debit Card</option>
        <option value="credit">Credit Card</option>
        <option value="transfer">Bank Transfer</option>
    </select>

    <button onclick="submitPayment()">Submit Payment</button>
</section>

</main>

<script>
const API = "http://localhost:4000";

window.onload = () => {
    const order = JSON.parse(localStorage.getItem("serviceOrder"));
    if (!order) {
        alert("No order found.");
        window.location.href = "index.html";
        return;
    }

    document.getElementById("rev-name").textContent = order.name;
    document.getElementById("rev-phone").textContent = order.phone;
    document.getElementById("rev-details").textContent = order.details;
};

function submitPayment() {
    const method = document.getElementById("payment-method").value;
    const order = JSON.parse(localStorage.getItem("serviceOrder"));

    fetch(API + "/api/payment", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            name: order.name,
            phone: order.phone,
            details: order.details,
            payment: method
        })
    })
    .then(() => {
        alert("Payment saved.");
        window.location.href = "index.html";
    });
}
</script>

</body>
</html>
